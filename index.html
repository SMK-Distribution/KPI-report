<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аналітика SMK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 10px; font-size: 12px; }
        h2 { text-align: center; color: var(--tg-theme-button-color, #2481cc); margin: 10px 0; }
        h3 { background: #eee; padding: 5px; margin: 15px 0 5px; border-radius: 4px; }
        h4 { margin: 5px 0; color: #555; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { background: #f9f9f9; padding: 6px; border: 1px solid #ccc; }
        td { padding: 5px; border: 1px solid #ccc; text-align: center; }
    </style>
</head>
<body>
    <h2>📊 Зведений звіт</h2>
    <div id="report">Завантаження...</div>

    <script>
        window.Telegram.WebApp.expand();
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfgEdnKgcbxSifn9wWmzb4ZoAxq8p0W4prmwFxsjWVV5TjMpR-Fqz6dv-2Ygb_ZcL_sXQ8a_Wkqdys/pub?gid=341643981&single=true&output=csv";

        Papa.parse(csvUrl, {
            download: true, header: false, skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                const report = document.getElementById('report');
                report.innerHTML = "";

                function renderSection(catName, startRow, endRow, colOffset) {
                    let html = `<h3>${catName}</h3>`;
                    // Групуємо по рядках (філіях)
                    for (let i = startRow; i <= endRow; i += 4) { // крок 4, бо 4 показники на філію
                        let branch = data[i][colOffset];
                        html += `<h4>Філія: ${branch}</h4><table><tr><th>Пок.</th><th>План</th><th>Факт</th><th>%</th></tr>`;
                        for(let j=0; j<4; j++) {
                            html += `<tr><td>${data[i+j][colOffset+1]}</td><td>${data[i+j][colOffset+2]}</td><td>${data[i+j][colOffset+3]}</td><td>${data[i+j][colOffset+4]}</td></tr>`;
                        }
                        html += `</table>`;
                    }
                    return html;
                }

                report.innerHTML += renderSection("ГМП", 4, 23, 0);
                report.innerHTML += renderSection("ІК", 4, 23, 7);
            }
        });
    </script>
</body>
</html>
