<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аналітика SMK</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 10px;
        }
        h2 { text-align: center; font-size: 1.2rem; margin: 10px 0; color: var(--tg-theme-button-color, #2481cc); }
        h3 { font-size: 1.1rem; margin: 15px 0 5px; }
        .table-container { width: 100%; overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background-color: #f4f4f4; color: #333; padding: 8px; border: 1px solid #ddd; white-space: nowrap; }
        td { padding: 6px; border: 1px solid #ddd; text-align: center; }
        .branch-cell { font-weight: bold; background: #fafafa; }
    </style>
</head>
<body>

    <h2>📊 Зведений звіт</h2>
    <div id="status">Завантаження даних...</div>
    
    <div id="reportContainer"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfgEdnKgcbxSifn9wWmzb4ZoAxq8p0W4prmwFxsjWVV5TjMpR-Fqz6dv-2Ygb_ZcL_sXQ8a_Wkqdys/pub?gid=341643981&single=true&output=csv";

        Papa.parse(csvUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                document.getElementById('status').style.display = 'none';

                function renderSection(title, startRow, endRow, colOffset) {
                    let html = `<h3>${title}</h3><table><tr><th>Філія</th><th>Пок.</th><th>План</th><th>Факт</th><th>%</th></tr>`;
                    let lastBranch = "";
                    for (let i = startRow; i <= endRow; i++) {
                        if (!data[i]) continue;
                        let branch = data[i][colOffset] || lastBranch;
                        lastBranch = branch;
                        html += `<tr>
                            <td class="branch-cell">${branch}</td>
                            <td>${data[i][colOffset + 1] || ''}</td>
                            <td>${data[i][colOffset + 2] || ''}</td>
                            <td>${data[i][colOffset + 3] || ''}</td>
                            <td>${data[i][colOffset + 4] || ''}</td>
                        </tr>`;
                    }
                    return html + `</table>`;
                }

                const container = document.getElementById('reportContainer');
                container.innerHTML = 
                    renderSection("ГМП", 3, 24, 0) + 
                    renderSection("ІК", 3, 24, 7);
            },
            error: function() {
                document.getElementById('status').innerText = "Помилка завантаження даних.";
            }
        });
    </script>
</body>
</html>
